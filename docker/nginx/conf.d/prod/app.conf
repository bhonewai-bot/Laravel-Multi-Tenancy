server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    # Security headers
    add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self';" always;
    add_header Strict-Transport-Security "max-age=300; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location ^~ /.well-known/cf-custom-hostname-challenge/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param REQUEST_SCHEME http;
        fastcgi_param SERVER_PORT 80;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2 default_server;
    http2 on;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    index index.php index.html;
    root /var/www/public;

    # Security headers
    add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self';" always;
    add_header Strict-Transport-Security "max-age=300; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cloudflare -> origin TLS certificate/key.
    # Replace files in docker/nginx/ssl for production deployment.
    ssl_certificate /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Vite-hashed static assets (JS/CSS) — 1-year cache, immutable
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Non-hashed static assets (images, fonts) — 1-day cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param REQUEST_SCHEME https;
        fastcgi_param SERVER_PORT 443;
        fastcgi_param HTTPS on;

        # No caching for dynamic responses (hide Laravel's Cache-Control first)
        fastcgi_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        # Security headers (must repeat because add_header in location overrides server-level)
        add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self';" always;
        add_header Strict-Transport-Security "max-age=300; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;

        add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self';" always;
        add_header Strict-Transport-Security "max-age=300; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
