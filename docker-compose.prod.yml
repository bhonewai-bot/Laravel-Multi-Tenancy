services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    restart: unless-stopped
    working_dir: /var/www
    command: ["php-fpm"]
    volumes:
      - ./docker/php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/prod/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - appnet

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    restart: unless-stopped
    working_dir: /var/www
    command:
      - /bin/sh
      - -lc
      - >
        exec php artisan queue:work database
        --queue="${DB_QUEUE:-default}"
        --tries="${QUEUE_WORKER_TRIES:-3}"
        --backoff="${QUEUE_WORKER_BACKOFF:-10}"
        --timeout="${QUEUE_WORKER_TIMEOUT:-120}"
        --sleep="${QUEUE_WORKER_SLEEP:-3}"
        --max-time="${QUEUE_WORKER_MAX_TIME:-3600}"
    volumes:
      - ./docker/php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - appnet

  mysql:
    image: mysql:8.0
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${MDB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MDB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
