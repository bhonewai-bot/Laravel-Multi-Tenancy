services:
  app:
    build:
      context: .
      dockerfile: DockerFile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      TENANCY_CENTRAL_DOMAIN: ${TENANCY_CENTRAL_DOMAIN}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_DATABASE: ${DB_DATABASE}
      SESSION_DRIVER: ${SESSION_DRIVER}
      DOMAIN_CHECK_TOKEN: ${DOMAIN_CHECK_TOKEN}
      CENTRAL_SUPERADMIN_EMAIL: ${CENTRAL_SUPERADMIN_EMAIL}
      CENTRAL_SUPERADMIN_NAME: ${CENTRAL_SUPERADMIN_NAME}
      CENTRAL_SUPERADMIN_PASSWORD: ${CENTRAL_SUPERADMIN_PASSWORD}
      CLOUDFLARE_ENABLED: ${CLOUDFLARE_ENABLED}
      CLOUDFLARE_API_BASE_URL: ${CLOUDFLARE_API_BASE_URL}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID}
      CLOUDFLARE_FALLBACK_ORIGIN: ${CLOUDFLARE_FALLBACK_ORIGIN}
      CLOUDFLARE_VALIDATION_METHOD: ${CLOUDFLARE_VALIDATION_METHOD}
      CLOUDFLARE_TIMEOUT: ${CLOUDFLARE_TIMEOUT}
      CLOUDFLARE_RETRY_TIMES: ${CLOUDFLARE_RETRY_TIMES}
      CLOUDFLARE_RETRY_SLEEP_MS: ${CLOUDFLARE_RETRY_SLEEP_MS}
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/prod/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - appnet

  queue:
    build:
      context: .
      dockerfile: DockerFile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      TENANCY_CENTRAL_DOMAIN: ${TENANCY_CENTRAL_DOMAIN}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_DATABASE: ${DB_DATABASE}
      SESSION_DRIVER: ${SESSION_DRIVER}
      DOMAIN_CHECK_TOKEN: ${DOMAIN_CHECK_TOKEN}
      CENTRAL_SUPERADMIN_EMAIL: ${CENTRAL_SUPERADMIN_EMAIL}
      CENTRAL_SUPERADMIN_NAME: ${CENTRAL_SUPERADMIN_NAME}
      CENTRAL_SUPERADMIN_PASSWORD: ${CENTRAL_SUPERADMIN_PASSWORD}
      DB_QUEUE: ${DB_QUEUE:-default}
      QUEUE_WORKER_TRIES: ${QUEUE_WORKER_TRIES:-3}
      QUEUE_WORKER_BACKOFF: ${QUEUE_WORKER_BACKOFF:-10}
      QUEUE_WORKER_TIMEOUT: ${QUEUE_WORKER_TIMEOUT:-120}
      QUEUE_WORKER_SLEEP: ${QUEUE_WORKER_SLEEP:-3}
      QUEUE_WORKER_MAX_TIME: ${QUEUE_WORKER_MAX_TIME:-3600}
      CLOUDFLARE_ENABLED: ${CLOUDFLARE_ENABLED}
      CLOUDFLARE_API_BASE_URL: ${CLOUDFLARE_API_BASE_URL}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID}
      CLOUDFLARE_FALLBACK_ORIGIN: ${CLOUDFLARE_FALLBACK_ORIGIN}
      CLOUDFLARE_VALIDATION_METHOD: ${CLOUDFLARE_VALIDATION_METHOD}
      CLOUDFLARE_TIMEOUT: ${CLOUDFLARE_TIMEOUT}
      CLOUDFLARE_RETRY_TIMES: ${CLOUDFLARE_RETRY_TIMES}
      CLOUDFLARE_RETRY_SLEEP_MS: ${CLOUDFLARE_RETRY_SLEEP_MS}
    restart: unless-stopped
    working_dir: /var/www
    command: >
      php artisan queue:work database
      --queue=${DB_QUEUE:-default}
      --tries=${QUEUE_WORKER_TRIES:-3}
      --backoff=${QUEUE_WORKER_BACKOFF:-10}
      --timeout=${QUEUE_WORKER_TIMEOUT:-120}
      --sleep=${QUEUE_WORKER_SLEEP:-3}
      --max-time=${QUEUE_WORKER_MAX_TIME:-3600}
    volumes:
      - ./:/var/www
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
