services:
  app:
    build:
      context: .
      dockerfile: DockerFile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    depends_on:
      - app
    networks:
      - appnet

  caddy: 
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_CHECK_TOKEN: ${DOMAIN_CHECK_TOKEN}
    volumes:
      - ./caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    networks:
      - appnet

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-central}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "9000:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-root}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet

  queue:
    build: 
      context: .
      dockerfile: DockerFile
    restart: unless-stopped
    working_dir: /var/www
    command: >
      php artisan queue:work database
      --queue=${DB_QUEUE:-default}
      --tries=${QUEUE_WORKER_TRIES:-3}
      --backoff=${QUEUE_WORKER_BACKOFF:-10}
      --timeout=${QUEUE_WORKER_TIMEOUT:-120}
      --sleep=${QUEUE_WORKER_SLEEP:-3}
      --max-time=${QUEUE_WORKER_MAX_TIME:-3600}
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:
